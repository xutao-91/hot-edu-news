name: CSIS Analysis Crawler

on:
  schedule:
    - cron: '0 13 * * *'  # 每天UTC 13:00运行（北京时间21:00）
  workflow_dispatch:

jobs:
  crawl-csis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4
    
    - name: Crawl CSIS Analysis
      run: python3 sources/csis/crawler.py
    
    - name: Commit results
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || (git commit -m "📰 CSIS: $(date +%Y-%m-%d-%H:%M)" && git push)
