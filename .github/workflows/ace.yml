name: ACE News Crawler

on:
  schedule:
    - cron: '0 16 * * *'  # 每天UTC 16:00运行（北京时间次日00:00）
  workflow_dispatch:

jobs:
  crawl-ace:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4
    
    - name: Crawl ACE News
      run: python3 sources/ace/crawler.py
    
    - name: Commit results
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || (git commit -m "📰 ACE: $(date +%Y-%m-%d-%H:%M)" && git push)
