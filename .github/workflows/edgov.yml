name: ED.gov News Crawler

on:
  schedule:
    - cron: '0 14 * * *'  # 每天UTC 14:00运行（北京时间22:00）
  workflow_dispatch:

jobs:
  crawl-edgov:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4
    
    - name: Crawl ED.gov News
      run: python3 sources/edgov/crawler.py
    
    - name: Commit results
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || (git commit -m "📰 ED.gov: $(date +%Y-%m-%d-%H:%M)" && git push)
