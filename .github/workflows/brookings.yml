name: Brookings Education Crawler

on:
  schedule:
    - cron: '0 12 * * *'  # 每天UTC 12:00运行（北京时间20:00）
  workflow_dispatch:

jobs:
  crawl-brookings:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install requests beautifulsoup4 python-dateutil
    
    - name: Crawl Brookings Education
      run: python3 sources/brookings/crawler.py
    
    - name: Commit results
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add data/
        git diff --staged --quiet || (git commit -m "📰 Brookings: $(date +%Y-%m-%d-%H:%M)" && git push)
